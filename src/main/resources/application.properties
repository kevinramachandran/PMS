spring.application.name=brewery-pms

# MySQL Database Configuration
app.timezone=Asia/Kolkata
spring.datasource.url=jdbc:mysql://localhost:3306/brewery_pms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=${app.timezone}&allowPublicKeyRetrieval=true&defaultAuthenticationPlugin=caching_sha2_password
spring.datasource.username=breweryAdmin123
spring.datasource.password=Password@123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=${app.timezone}
spring.jackson.time-zone=${app.timezone}

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
