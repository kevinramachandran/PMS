spring.application.name=brewery-pms

# Runtime overrides supported: --spring.datasource.url=... --spring.datasource.username=... --spring.datasource.password=...
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/brewery_pms?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=${app.timezone}&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:breweryAdmin123}
spring.datasource.password=${DB_PASSWORD:Password@123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=${app.timezone}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.jackson.time-zone=${app.timezone}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

logging.file.name=${LOG_FILE:logs/brewery-pms.log}
logging.level.root=${LOG_LEVEL_ROOT:INFO}
logging.level.org.springframework.web=${LOG_LEVEL_WEB:INFO}

app.timezone=${APP_TIMEZONE:UTC}

app.upload.footer-buttons.dir=${UPLOAD_DIR:./uploads/footer-buttons}